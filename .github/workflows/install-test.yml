name: native-install-check

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/install-test.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/install-test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Check pinned Codex baseline is consistent
        run: |
          source scripts/versions.env
          grep -F "CODEX_CLI_VERSION=\"$CODEX_CLI_VERSION\"" scripts/versions.env
          grep -F "ARG CODEX_CLI_VERSION=$CODEX_CLI_VERSION" Dockerfile

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build native image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: muselab-codex:check
      - name: Verify Codex CLI inside image
        run: |
          docker run --rm --entrypoint codex muselab-codex:check --version
          docker run --rm --entrypoint codex muselab-codex:check app-server generate-json-schema --out /tmp/schema
