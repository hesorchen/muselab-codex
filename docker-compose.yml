services:
  muselab-codex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_CLI_VERSION: "0.144.1"
    image: muselab-codex:latest
    container_name: muselab-codex
    restart: unless-stopped
    ports:
      - "${MUSELAB_BIND:-127.0.0.1}:${MUSELAB_PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      MUSELAB_ROOT: /data
      CODEX_HOME: /home/muse/.codex
    volumes:
      - ${ARCHIVE_DIR:-./data}:/data
      # Codex owns login state, configuration, threads, Skills and MCP setup.
      # Keep this mount private and writable so login refreshes and native
      # thread persistence continue to work across container recreation.
      - ${CODEX_HOME:-${HOME}/.codex}:/home/muse/.codex
    mem_limit: 4g
    mem_reservation: 1g
    pids_limit: 4096
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://127.0.0.1:8765/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
